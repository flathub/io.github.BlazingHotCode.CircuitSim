app-id: io.github.BlazingHotCode.CircuitSim
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk21
command: circuitsim
finish-args:
  - --share=ipc
  - --socket=x11
modules:
  - name: circuitsim
    buildsystem: simple
    build-commands:
      - find src/main/java -name '*.java' | sort > sources.txt
      - mkdir -p out && /usr/lib/sdk/openjdk21/bin/javac --release 21 -d out @sources.txt
      - cp -R src/main/resources/. out/
      - /usr/lib/sdk/openjdk21/bin/jar --create --file CircuitSim.jar --main-class circuitsim.CircuitSim -C out .
      - /usr/lib/sdk/openjdk21/bin/jlink --module-path /usr/lib/sdk/openjdk21/jmods --add-modules java.base,java.desktop,java.net.http --output runtime --strip-debug --no-man-pages --no-header-files --compress=2
      - install -Dm755 circuitsim.sh /app/bin/circuitsim
      - mkdir -p /app/jre
      - cp -a runtime/. /app/jre/
      - install -Dm644 CircuitSim.jar /app/lib/CircuitSim.jar
      - install -Dm644 packaging/flatpak/io.github.BlazingHotCode.CircuitSim.desktop /app/share/applications/io.github.BlazingHotCode.CircuitSim.desktop
      - install -Dm644 packaging/flatpak/io.github.BlazingHotCode.CircuitSim.metainfo.xml /app/share/metainfo/io.github.BlazingHotCode.CircuitSim.metainfo.xml
      - install -Dm644 packaging/circuitsim.png /app/share/icons/hicolor/256x256/apps/io.github.BlazingHotCode.CircuitSim.png
      - install -Dm644 LICENSE /app/share/licenses/io.github.BlazingHotCode.CircuitSim/circuitsim/LICENSE
    sources:
      - type: archive
        url: https://github.com/BlazingHotCode/CircuitSim/archive/797471d29be54c3ab67f37c80f464ed0b964eb60.tar.gz
        sha256: 051c65c507633d607fb48f412df600cce9be9b3e2ad340c807bd168fd06c1058
      - type: script
        dest-filename: circuitsim.sh
        commands:
          - exec /app/jre/bin/java -Dfile.encoding=UTF-8 -Dcircuitsim.appVersion=1.1.8 -jar /app/lib/CircuitSim.jar "$@"
